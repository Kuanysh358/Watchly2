services:
  watchly.web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=watchly.db;Database=WatchlyDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
      Tmdb__ApiKey: "${TMDB_API_KEY}"
      YouTube__ApiKey: "${YOUTUBE_API_KEY}"
    depends_on:
      - watchly.db

  watchly.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - watchly-sql-data:/var/opt/mssql

volumes:
  watchly-sql-data:
